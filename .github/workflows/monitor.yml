name: Monitor Pasantias

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          DESTINATARIO: ${{ secrets.DESTINATARIO }}
        run: python monitor_pasantias.py

      - name: Guardar estado en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pasantias_vistas.json
          git diff --cached --quiet || git commit -m "Actualizar estado pasantías"
          git push